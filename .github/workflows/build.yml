name: build

on:
  push:
  workflow_dispatch:

jobs:
  win64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        run: cmake --preset x64-release

      - name: Build
        run: cmake --build --preset x64-release

      - name: Upload gallery exe
        uses: actions/upload-artifact@v4
        with:
          name: media-gallery-win64
          path: build/x64-release/MediaGallery.exe

      - name: Upload standalone player exe
        uses: actions/upload-artifact@v4
        with:
          name: minimal-player-win64
          path: build/x64-release/minimal-player.exe
